spring.application.name=SignatureNumeriqueBackend

# =========================
# DATABASE (POSTGRESQL)
# =========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false

# =========================
# MONGODB (AUDIT)
# =========================
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI}

# =========================
# FILE UPLOAD
# =========================
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# =========================
# MAIL (BREVO SMTP)
# =========================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=2525
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=false

# =========================
# GOOGLE OAUTH2
# =========================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI}

# =========================
# TSA (TIMESTAMP)
# =========================
tsa.url=https://freetsa.org/tsr
tsa.enabled=true
tsa.hash-algorithm=SHA256

# =========================
# PKI & HSM
# =========================
pki.certificat.duree.minutes=365
pki.stockage.chemin=${PKI_STOCKAGE:/data/pki}
hsm.pin=${HSM_PIN}
hsm.pin.utilisateur=${HSM_USER_PIN}
hsm.config=${SOFTHSM2_CONF:/app/softhsm2.conf}

# =========================
# SUPER ADMIN
# =========================
app.superadmin.email=${SUPERADMIN_EMAIL}
app.superadmin.password=${SUPERADMIN_PASSWORD}
app.superadmin.nom=${SUPERADMIN_NOM}
app.superadmin.prenom=${SUPERADMIN_PRENOM}
app.superadmin.telephone=${SUPERADMIN_PHONE}

# =========================
# SERVER
# =========================
server.port=${PORT:8080}
server.ssl.enabled=false
server.forward-headers-strategy=native

# =========================
# ARCHIVE
# =========================
archivage.dossier.base=${ARCHIVAGE_DOSSIER_BASE:/data/archives}
archivage.duree.conservation.ans=10
archivage.format.pdfa=true
archivage.compression=true

# =========================
# LIMITES SIGNATURES
# =========================
app.signature.limite-quotidienne=100
app.signature.limite-hebdomadaire=500
app.signature.limite-mensuelle=2000

# =========================
# IA & API
# =========================
ia.api.key=${SPRING_BOOT_API_KEY}
mistral.api.key=${MISTRAL_API_KEY}